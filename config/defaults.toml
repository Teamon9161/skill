[sources.github]
url = "https://github.com/{owner}/{repo}.git"

[sources.ficc]
timeout = 1
urls = [
    "http://92.168.66.38:10112/{owner}/{repo}.git",
    "http://192.168.66.38:10112/{owner}/{repo}.git",
]

[agents.claude]
label = "Claude Code"
dir = ".claude"
skills = "skills"
plugin = "claude"
plugin_dir = ".claude-plugin"

[agents.codex]
label = "Codex"
dir = ".codex"
skills = "skills"

# Force selected repos to use git/symlink installs even if plugin metadata exists.
# prefer_git = ["obra/superpowers"]

[aliases]
superpowers = "@obra/superpowers"
claude-hud = "@jarrodwatts/claude-hud"
ham = "@kromahlusenii-ops/ham"
lark = "@larksuite/cli"
duck-ext = "ficc@skills/duck_ext"
dolphindb = "ficc@skills/dolphindb-claude"
wiki = "ficc@skills/wiki"
pybond = "ficc@skills/pybond"

# User config can add aliases in $SKILL_HOME/config.toml:
# [aliases]
# ham = "@kromahlusenii-ops/ham"
#
# [aliases.local-demo]
# value = "C:/path/to/demo-skill"
